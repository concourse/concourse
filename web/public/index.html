<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="modulepreload" href="{{asset "elm-setup.js"}}">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Concourse</title>
    <script src="{{asset "elm.min.js"}}"></script>
    <script src="{{asset "clipboard.min.js"}}" defer></script>
    <link rel="stylesheet" type="text/css" href="{{asset "main.css"}}" />
    <link rel="icon" type="image/png" sizes="32x32" id="favicon" href="{{asset "images/favicon.png"}}" />
    <link rel="manifest" href="{{asset "manifest.webmanifest"}}" />
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <meta name="auth-token" content="{{ .AuthToken }}">
    <meta name="feature-flags" content="{{ jsonMarshal .FeatureFlags }}">
    <meta name="turbulence-img-src" content='{{asset "images/buckleup.svg"}}'>
    <meta name="not-found-img-src" content='{{asset "images/parachute-error-404.svg"}}'>
  </head>
  <body>
    <noscript>Please enable JavaScript in your browser to view Concourse pipelines and build logs.</noscript>
    <div id="elm-app-embed"></div>
    <script src="{{asset "bundle.js"}}" nomodule></script>
    <script src="{{asset "elm-setup.js"}}" type="module"></script>
  </body>
</html>

jobs:
  - name: unit
    plan:
      - task: run
        config:
          platform: linux
          image_resource:
            type: mock
            source: { mirror_self: true }
          run:
            path: /bin/bash
            args:
              - -c
              - |
                foo="((foo))"
                flen=${#foo}
                fhalf=$((flen / 2))

                nested="((caz.baz))"
                nlen=${#nested}
                nhalf=$((nlen / 2))

                echo "plain1:" ${foo:0:fhalf}
                echo "plain2:" ${foo:fhalf}
                echo "nested1:" ${nested:0:nhalf}
                echo "nested2:" ${nested:nhalf}
